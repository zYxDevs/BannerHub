name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '!v*-pre*'
      - '!v*-beta*'
      - '!v*-amazon*'

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out_base -f

      - name: Remove uncompilable apktool artifacts
        run: |
          rm -f apktool_out_base/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out_base/res/values/public.xml

          # Extract original classes12.dex and skip smali reassembly (dex index limit workaround)
          APK=$(ls base/*.apk | head -1)
          unzip -p "$APK" classes12.dex > apktool_out_base/classes12.dex
          rm -rf apktool_out_base/smali_classes12

      - name: Apply patches
        run: |
          if [ -d "patches" ] && [ "$(ls -A patches)" ]; then
            echo "Applying patches..."
            cp -r patches/. apktool_out_base/
            echo "Patches applied."
          else
            echo "No patches to apply."
          fi

      - name: Inject build version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Build version: $VERSION"
          # Use | as sed delimiter so branch names containing / (e.g. fix/foo) don't break the s/// expression.
          sed -i "s|^  versionName: .*|  versionName: $VERSION|" apktool_out_base/apktool.yml
          echo "versionName -> $VERSION"

      - name: Patch AppUtils phone-home version
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out_base/smali_classes13/com/xj/common/http/ClientParams.smali',
              '    invoke-static {}, Lcom/blankj/utilcode/util/AppUtils;->e()Ljava/lang/String;\n'
              '\n'
              '    .line 40\n'
              '    .line 41\n'
              '    .line 42\n'
              '    move-result-object v3\n',
              '    # BannerHub: hardcode phone-home version — versionName is now BH version\n'
              '    const-string v3, "5.3.5"\n',
              'ClientParams: hardcode AppUtils.getAppVersionName() -> 5.3.5'
          )

          patch(
              'apktool_out_base/smali_classes7/com/xj/common/http/TokenInterceptor.smali',
              '    invoke-static {}, Lcom/blankj/utilcode/util/AppUtils;->e()Ljava/lang/String;\n'
              '\n'
              '    .line 65\n'
              '    .line 66\n'
              '    .line 67\n'
              '    move-result-object v8\n',
              '    # BannerHub: hardcode phone-home version — versionName is now BH version\n'
              '    const-string v8, "5.3.5"\n',
              'TokenInterceptor: hardcode AppUtils.getAppVersionName() -> 5.3.5'
          )

          print("AppUtils phone-home patches applied.")
          PYEOF

      - name: Apply Stub Upgrade Check smali patch
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out_base/smali_classes8/com/xj/landscape/launcher/ui/setting/holder/SettingUpgradeHolder$onBind$1$1.smali',
              '    sget-object p1, Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;->a:Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;\n'
              '\n'
              '    .line 32\n'
              '    .line 33\n'
              '    iput-object v0, p0, Lcom/xj/landscape/launcher/ui/setting/holder/SettingUpgradeHolder$onBind$1$1;->L$0:Ljava/lang/Object;\n'
              '\n'
              '    .line 34\n'
              '    .line 35\n'
              '    iput v3, p0, Lcom/xj/landscape/launcher/ui/setting/holder/SettingUpgradeHolder$onBind$1$1;->label:I\n'
              '\n'
              '    .line 36\n'
              '    .line 37\n'
              '    invoke-virtual {p1, v3, p0}, Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;->b(ILkotlin/coroutines/Continuation;)Ljava/lang/Object;\n'
              '\n'
              '    .line 38\n'
              '    .line 39\n'
              '    .line 40\n'
              '    move-result-object p1\n',
              '    # BannerHub: stub upgrade check — never call AppUpgradeRepo, force null entity\n'
              '    const/4 p1, 0x0\n',
              'SettingUpgradeHolder: stub AppUpgradeRepo.getAppUpgradeApk() -> null'
          )

          patch(
              'apktool_out_base/smali_classes6/com/xj/landscape/launcher/utils/ApkUpdateUtils$checkUpdate$1$1.smali',
              '    sget-object p1, Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;->a:Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;\n'
              '\n'
              '    .line 28\n'
              '    .line 29\n'
              '    iput v2, p0, Lcom/xj/landscape/launcher/utils/ApkUpdateUtils$checkUpdate$1$1;->label:I\n'
              '\n'
              '    .line 30\n'
              '    .line 31\n'
              '    const/4 v1, 0x2\n'
              '\n'
              '    .line 32\n'
              '    invoke-virtual {p1, v1, p0}, Lcom/xj/landscape/launcher/data/repository/AppUpgradeRepo;->b(ILkotlin/coroutines/Continuation;)Ljava/lang/Object;\n'
              '\n'
              '    .line 33\n'
              '    .line 34\n'
              '    .line 35\n'
              '    move-result-object p1\n',
              '    # BannerHub: stub launch-time upgrade dialog — never call AppUpgradeRepo, force null entity\n'
              '    const/4 p1, 0x0\n',
              'ApkUpdateUtils.checkUpdate: stub AppUpgradeRepo.getAppUpgradeApk() -> null'
          )

          print("Stub Upgrade Check patch applied.")
          PYEOF

      - name: Apply Grant Root Access smali patches
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Patch 1: SettingBtnHolder.w() — handle click for contentType=0x64 (Grant Root Access)
          # Injected EARLY right after getContentType() move-result p0, while p2 is still a View.
          patch(
              'apktool_out_base/smali_classes6/com/xj/landscape/launcher/ui/setting/holder/SettingBtnHolder.smali',
              '    move-result p0\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              '    move-result p0\n'
              '\n'
              '    # BannerHub: Grant Root Access (contentType=0x64) — injected early while p2 is still a View\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_root_grant\n'
              '\n'
              '    invoke-virtual {p2}, Landroid/view/View;->getContext()Landroid/content/Context;\n'
              '\n'
              '    move-result-object v0\n'
              '\n'
              '    invoke-static {v0}, Lcom/xj/winemu/sidebar/BhRootGrantHelper;->requestRoot(Landroid/content/Context;)V\n'
              '\n'
              '    sget-object v0, Lkotlin/Unit;->a:Lkotlin/Unit;\n'
              '\n'
              '    return-object v0\n'
              '\n'
              '    :bh_skip_root_grant\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              'SettingBtnHolder.w(): Grant Root Access click handler (contentType=0x64)'
          )

          # Patch 2: SettingItemEntity.getContentName() — return "Grant Root Access" for contentType=0x64
          patch(
              'apktool_out_base/smali_classes13/com/xj/landscape/launcher/data/model/entity/SettingItemEntity.smali',
              '    :cond_15\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              '    :cond_15\n'
              '    # BannerHub: Grant Root Access (contentType=0x64)\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_grant_name\n'
              '\n'
              '    const-string p0, "Grant Root Access"\n'
              '\n'
              '    return-object p0\n'
              '\n'
              '    :bh_skip_grant_name\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              'SettingItemEntity.getContentName(): return "Grant Root Access" for contentType=0x64'
          )

          # Patch 3: SettingItemViewModel.k() — add Grant Root Access TYPE_BTN below Clear Cache
          patch(
              'apktool_out_base/smali_classes3/com/xj/landscape/launcher/vm/SettingItemViewModel.smali',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BannerHub: Grant Root Access button (contentType=0x64) below Clear Cache\n'
              '    new-instance v0, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;\n'
              '\n'
              '    const/16 v2, 0x64\n'
              '\n'
              '    invoke-direct/range {v0 .. v6}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '-><init>(IILandroid/util/SparseArray;ZILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              'SettingItemViewModel.k(): add Grant Root Access TYPE_BTN after Clear Cache'
          )

          print("\nAll Grant Root Access patches applied successfully.")
          PYEOF

      - name: Apply Settings Import/Export smali patch
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out_base/smali_classes10/com/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu.smali',
              '    invoke-static {v8, v0}, Lcom/xj/common/utils/XjLog;->c(Ljava/lang/String;Ljava/lang/String;)V\n'
              '\n'
              '    .line 255\n'
              '    return-object v1\n'
              '.end method\n',
              '    invoke-static {v8, v0}, Lcom/xj/common/utils/XjLog;->c(Ljava/lang/String;Ljava/lang/String;)V\n'
              '\n'
              '    .line 255\n'
              '    # BH: p0=this is v19 (locals 19 + 5 params), out of range for invoke-direct; move to v4\n'
              '    move-object/from16 v4, p0\n'
              '    # BH: read GameDetailEntity from continuation L$0 (p1 is null on coroutine resume)\n'
              '    iget-object v3, v5, Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu$getPcGamesOptions$1;->L$0:Ljava/lang/Object;\n'
              '    check-cast v3, Lcom/xj/common/service/bean/GameDetailEntity;\n'
              '\n'
              '    # BH: Export Config option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Export Config"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhExportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhExportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BH: Import Config option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Import Config"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhImportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhImportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BH: Frontend Export option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Frontend Export"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhFrontendExportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhFrontendExportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BH: PC Vibration Settings option — inserted right AFTER the\n'
              '    # "PC Game Settings" entry instead of appended at the end. Tencent\'s\n'
              '    # popup widget has no scroll indicator and overflows past 5 items,\n'
              '    # so a tail-appended option is invisible until the user happens to\n'
              '    # discover the scroll behaviour. Build the Option first (so the\n'
              '    # construction can use the wide v9..v17 range), then walk the list\n'
              '    # with low registers (v10 = idx) and List.add(idx+1, opt). Falls\n'
              '    # back to append-at-end if "PC Game Settings" isn\'t in the list\n'
              '    # (non-English locale, etc.) so the option is never lost.\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "PC Vibration Settings"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhVibrationLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhVibrationLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    # v9 = constructed Option; v10..v17 are now dead. Use v10 as idx\n'
              '    # and v11/v12 as scratch — all in the v0..v15 range that the 4-bit\n'
              '    # register encodings for if-ge / invoke-interface require.\n'
              '    const/4 v10, 0x0\n'
              '    :bh_vib_search_loop\n'
              '    invoke-interface {v1}, Ljava/util/List;->size()I\n'
              '    move-result v11\n'
              '    if-ge v10, v11, :bh_vib_search_done\n'
              '    invoke-interface {v1, v10}, Ljava/util/List;->get(I)Ljava/lang/Object;\n'
              '    move-result-object v11\n'
              '    check-cast v11, Lcom/xj/common/view/popup/Option;\n'
              '    iget-object v11, v11, Lcom/xj/common/view/popup/Option;->a:Ljava/lang/String;\n'
              '    const-string v12, "PC Game Settings"\n'
              '    invoke-virtual {v11, v12}, Ljava/lang/String;->equals(Ljava/lang/Object;)Z\n'
              '    move-result v11\n'
              '    if-eqz v11, :bh_vib_search_next\n'
              '    add-int/lit8 v10, v10, 0x1\n'
              '    goto :bh_vib_search_done\n'
              '    :bh_vib_search_next\n'
              '    add-int/lit8 v10, v10, 0x1\n'
              '    goto :bh_vib_search_loop\n'
              '    :bh_vib_search_done\n'
              '\n'
              '    invoke-interface {v1, v10, v9}, Ljava/util/List;->add(ILjava/lang/Object;)V\n'
              '\n'
              '    return-object v1\n'
              '.end method\n',
              'GameDetailSettingMenu.W(): inject Export Config + Import Config + Frontend Export + PC Vibration Settings options'
          )
          print("Settings Import/Export + Vibration patches applied.")
          PYEOF

      # libevshim.so removed: the LD_PRELOAD'd keepalive shim's in-memory
      # winebus patcher corrupted box64's dynarec (every x86-64/box64 launch
      # CPU-spun ~60s then the wine process died — v3.7.0 regression).
      # Replaced by the preload-free on-disk winebus duration patch in
      # BhVibrationController.ensureWinebusDurationPatchOnce() (ported from
      # GameNative PR #1214 / TideGear). No extra .so is mapped into Wine.

      - name: Apply BhVibration smali patches
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Patch 1: GamepadServerManager.onRumble(III)V — entry hook
          # Calls BhVibrationController.onRumble(slot, low, high). If it returns true,
          # the controller fallthrough is skipped (Off / Device-only modes).
          patch(
              'apktool_out_base/smali_classes10/com/winemu/core/gamepad/GamepadServerManager.smali',
              '.method private final onRumble(III)V\n'
              '    .locals 2\n'
              '    .annotation build Landroidx/annotation/Keep;\n'
              '    .end annotation\n'
              '\n'
              '    .line 1\n'
              '    if-ltz p1, :cond_0\n',
              '.method private final onRumble(III)V\n'
              '    .locals 2\n'
              '    .annotation build Landroidx/annotation/Keep;\n'
              '    .end annotation\n'
              '\n'
              '    # BH: PC-accurate rumble dispatcher hook\n'
              '    invoke-static {p1, p2, p3}, Lcom/xj/winemu/vibration/BhVibrationController;->onRumble(III)Z\n'
              '\n'
              '    move-result v0\n'
              '\n'
              '    if-eqz v0, :bh_rumble_fallthrough\n'
              '\n'
              '    return-void\n'
              '\n'
              '    :bh_rumble_fallthrough\n'
              '\n'
              '    .line 1\n'
              '    if-ltz p1, :cond_0\n',
              'GamepadServerManager.onRumble(III)V: inject BhVibrationController entry hook'
          )

          # Patch 2: GamepadDevice$Physical.h(II)V — controller dispatch delegate
          # Reads deviceId from field d:I and hands (deviceId, low, high) to the extension.
          # If it returns true (mode=Controller/Both handled it, or mode=Off/Device silenced it),
          # skip the stock per-vibrator fallback entirely.
          patch(
              'apktool_out_base/smali_classes5/com/winemu/core/gamepad/GamepadDevice$Physical.smali',
              '.method public h(II)V\n'
              '    .locals 3\n'
              '\n'
              '    .line 1\n'
              '    const v0, 0xffff\n',
              '.method public h(II)V\n'
              '    .locals 3\n'
              '\n'
              '    # BH: PC-accurate controller dispatch\n'
              '    iget v0, p0, Lcom/winemu/core/gamepad/GamepadDevice$Physical;->d:I\n'
              '\n'
              '    invoke-static {v0, p1, p2}, Lcom/xj/winemu/vibration/BhVibrationController;->dispatchToController(III)Z\n'
              '\n'
              '    move-result v0\n'
              '\n'
              '    if-eqz v0, :bh_phys_fallthrough\n'
              '\n'
              '    return-void\n'
              '\n'
              '    :bh_phys_fallthrough\n'
              '\n'
              '    .line 1\n'
              '    const v0, 0xffff\n',
              'GamepadDevice$Physical.h(II)V: inject BhVibrationController.dispatchToController'
          )

          # NOTE: PC Vibration Settings is exposed in the per-game settings menu
          # (GameDetailSettingMenu.W() patch above) — NOT in BannerHub's global
          # Advanced settings sidebar. This way the settings file backing them
          # is pc_g_setting<gameId>, which BhSettingsExporter already exports
          # and imports as part of the per-game config bundle. No new sidebar
          # contentType needed; the launch path goes through BhVibrationLambda.

          # Patch 3: EnvironmentController.b(Wine, String) — preload-free winebus
          # duration patch trigger (REPLACES the old libevshim LD_PRELOAD inject).
          # The old approach LD_PRELOAD'd libevshim.so into every Wine subprocess;
          # its in-memory winebus patcher corrupted box64's dynarec, so every
          # x86-64/box64 game launch CPU-spun ~60s then the wine process died
          # (v3.7.0 regression). Instead, fire BhVibrationController.ensure-
          # WinebusDurationPatchOnce(ctx) here — env builder, just before the
          # Wine handoff, Context available at p0->a. It scans the files tree
          # for every winebus.so and rewrites the SDL duration loads on disk
          # (aarch64 + x86_64), so SDL2's ~1 s rumble auto-expiry never fires.
          # No extra .so is mapped into Wine. Method self-gates repeat scans;
          # NO LD_PRELOAD modification. Ported from GameNative PR #1214 (TideGear).
          # Anchor: just before `EnvVars.f("LD_PRELOAD", v1)`, after both branches join.
          patch(
              'apktool_out_base/smali_classes6/com/winemu/core/controller/EnvironmentController.smali',
              '    :cond_2\n'
              '    :goto_1\n'
              '    const-string v2, "LD_PRELOAD"\n',
              '    :cond_2\n'
              '    :goto_1\n'
              '\n'
              '    # BH: preload-free winebus duration patch (replaces libevshim LD_PRELOAD)\n'
              '    iget-object v2, p0, Lcom/winemu/core/controller/EnvironmentController;->a:Landroid/content/Context;\n'
              '    invoke-static {v2}, Lcom/xj/winemu/vibration/BhVibrationController;->ensureWinebusDurationPatchOnce(Landroid/content/Context;)V\n'
              '\n'
              '    const-string v2, "LD_PRELOAD"\n',
              'EnvironmentController.b(Wine, String): preload-free winebus duration patch (replaces libevshim LD_PRELOAD)'
          )

          # Patch 4: GamepadDevice$Physical.g()V — stop hook.
          # Stock GamepadDevice.f(II)V routes (0,0) -> g() and non-zero -> h(II)V.
          # Our Patch 2 only hooks h(II)V, so (0,0) would bypass our handler.
          # onStop is void: it issues our pre-cancel supersede pattern
          # (Samsung-HAL workaround) then falls through to stock g(), which
          # iterates the vibrators and cancels each.
          patch(
              'apktool_out_base/smali_classes5/com/winemu/core/gamepad/GamepadDevice$Physical.smali',
              '.method public g()V\n'
              '    .locals 1\n'
              '\n'
              '    .line 1\n'
              '    invoke-virtual {p0}, Lcom/winemu/core/gamepad/GamepadDevice$Physical;->o()Ljava/util/List;\n',
              '.method public g()V\n'
              '    .locals 1\n'
              '\n'
              '    # BH: dispatch to our handler (supersede pattern), then fall through.\n'
              '    iget v0, p0, Lcom/winemu/core/gamepad/GamepadDevice$Physical;->d:I\n'
              '    invoke-static {v0}, Lcom/xj/winemu/vibration/BhVibrationController;->onStop(I)V\n'
              '\n'
              '    .line 1\n'
              '    invoke-virtual {p0}, Lcom/winemu/core/gamepad/GamepadDevice$Physical;->o()Ljava/util/List;\n',
              'GamepadDevice$Physical.g(): inject BhVibrationController.onStop pre-cancel supersede'
          )

          # Patch 5: GamepadManager.B0(GamepadConnectionEvent)V — connect hook.
          # On controller-connect, libvfs lazily registers the virtual SDL joystick
          # and only emits SDL_JOYDEVICEADDED on first input. Until that fires,
          # winebus.so doesn't open the slot's joystick and rumble dispatches
          # silently no-op. Multi-controller users see the second/Nth controller's
          # rumble fail until they press any button on it.
          #
          # We extract slot via GamepadSlotManager.m(GamepadDevice)I (field e on
          # GamepadManager) and pass the GamepadServerManager (field c) plus slot
          # to BhVibrationController.scheduleWakeup, which queues a button-14
          # flicker on the slot's GamepadState gated on libevshim's winedevice
          # ready marker. drainPendingWakeups() then fires staggered (200 ms per
          # slot, ascending) so libvfs registers each slot before the next.
          #
          # Inject BEFORE stock body so registers v0..v3 (declared by .locals 4)
          # are reused after our injection — stock's first instruction
          # const-string v0, "event" overwrites v0 cleanly.
          patch(
              'apktool_out_base/smali_classes7/com/winemu/core/gamepad/GamepadManager.smali',
              '.method public B0(Lcom/winemu/core/gamepad/GamepadConnectionEvent;)V\n'
              '    .locals 4\n'
              '\n'
              '    .line 1\n'
              '    const-string v0, "event"\n',
              '.method public B0(Lcom/winemu/core/gamepad/GamepadConnectionEvent;)V\n'
              '    .locals 4\n'
              '\n'
              '    # BH: schedule synthetic wake-up so libvfs registers this slot\n'
              '    # with SDL before the user presses anything.\n'
              '    #\n'
              '    # Only run for GamepadDevice$Physical. The virtual touch-controls\n'
              '    # gamepad (GamepadDevice$Virtual) does NOT need a libvfs lazy-\n'
              '    # attach trigger, and calling GamepadSlotManager.m() on it has a\n'
              '    # side-effect of pre-registering the slot — which then makes\n'
              '    # stock B0\'s own registration throw "Virtual gamepad already\n'
              '    # exists in slot 0", leaves GamepadManager in a broken state,\n'
              '    # and causes WineActivity to crash later with\n'
              '    # "Virtual gamepad enabled but no controller found".\n'
              '    invoke-virtual {p1}, Lcom/winemu/core/gamepad/GamepadConnectionEvent;->a()Lcom/winemu/core/gamepad/GamepadDevice;\n'
              '    move-result-object v0\n'
              '    if-eqz v0, :bh_wakeup_skip\n'
              '    instance-of v3, v0, Lcom/winemu/core/gamepad/GamepadDevice$Physical;\n'
              '    if-eqz v3, :bh_wakeup_skip\n'
              '    iget-object v1, p0, Lcom/winemu/core/gamepad/GamepadManager;->e:Lcom/winemu/core/gamepad/GamepadSlotManager;\n'
              '    invoke-virtual {v1, v0}, Lcom/winemu/core/gamepad/GamepadSlotManager;->m(Lcom/winemu/core/gamepad/GamepadDevice;)I\n'
              '    move-result v1\n'
              '    iget-object v2, p0, Lcom/winemu/core/gamepad/GamepadManager;->c:Lcom/winemu/core/gamepad/GamepadServerManager;\n'
              '    invoke-static {v2, v1}, Lcom/xj/winemu/vibration/BhVibrationController;->scheduleWakeup(Ljava/lang/Object;I)V\n'
              '    :bh_wakeup_skip\n'
              '\n'
              '    .line 1\n'
              '    const-string v0, "event"\n',
              'GamepadManager.B0(): inject BhVibrationController.scheduleWakeup post-connect'
          )

          print("\nBhVibration smali patches applied successfully.")
          PYEOF

      - name: Apply Offline Launch smali patch
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Early-return GameConfigDownloadTask.executeInternal as Unit when network is unreachable,
          # so launches of imported PC games (and any other source) succeed offline using
          # whatever container/components were set up the last time the game launched online.
          # Steam already has its own offline login bypass in SteamGameByPcEmuLaunchStrategy;
          # this covers PcGameHubMgrImport / LocalImport / GameHubSvrDownload too.
          # Register v2 is the label int loaded at method entry and is unconditionally
          # overwritten by the next instruction (iget-object v2 ...->d:WineActivityData),
          # so reusing it here is safe.
          patch(
              'apktool_out_base/smali_classes8/com/xj/winemu/setup/tasks/GameConfigDownloadTask.smali',
              '    :cond_3\n'
              '    invoke-static {p2}, Lkotlin/ResultKt;->b(Ljava/lang/Object;)V\n'
              '\n'
              '    .line 66\n'
              '    .line 67\n'
              '    .line 68\n'
              '    sget-object p2, Lcom/xj/winemu/setup/core/SetupLogger;->a:Lcom/xj/winemu/setup/core/SetupLogger;\n',
              '    :cond_3\n'
              '    invoke-static {p2}, Lkotlin/ResultKt;->b(Ljava/lang/Object;)V\n'
              '\n'
              '    # BannerHub: skip game-config download when offline so imported PC games launch with last-known setup\n'
              '    invoke-static {}, Lcom/blankj/utilcode/util/NetworkUtils;->r()Z\n'
              '    move-result v2\n'
              '    if-nez v2, :bh_offline_continue\n'
              '    sget-object v2, Lkotlin/Unit;->a:Lkotlin/Unit;\n'
              '    return-object v2\n'
              '    :bh_offline_continue\n'
              '\n'
              '    .line 66\n'
              '    .line 67\n'
              '    .line 68\n'
              '    sget-object p2, Lcom/xj/winemu/setup/core/SetupLogger;->a:Lcom/xj/winemu/setup/core/SetupLogger;\n',
              'GameConfigDownloadTask.executeInternal: early-return Unit when NetworkUtils.r() is false'
          )

          # SetGameRecommConfigTask reads the GameEnvConfigEntity from SetupTaskContext;
          # since GameConfigDownloadTask is now skipped offline, the entity is null and
          # SetGameRecommConfigTask would throw IllegalStateException("Game environment
          # config not found in context"). We cannot patch SetGameRecommConfigTask itself
          # because its class lives in smali_classes12, which is replaced by the prebuilt
          # classes12.dex at build time (dex index limit workaround above) — patches to
          # files in smali_classes12 never reach the final APK.
          # Workaround: patch the factory that builds the task list (SetupTaskFactory.g(),
          # in smali_classes2, which IS reassembled) to skip adding the task to the list
          # when offline. SetupTaskManager then never sees it. Same net effect.
          # Register v2: free local register (`.locals 3` for method g, only v0/v1 in use
          # at this point — v0 is the ArrayList being built, v1 is the PcEmuSetupRepository).
          patch(
              'apktool_out_base/smali_classes2/com/xj/winemu/setup/factory/SetupTaskFactory.smali',
              '    invoke-virtual {p0, p2, p3}, Lcom/xj/winemu/setup/factory/SetupTaskFactory;->h(Lcom/xj/winemu/settings/PcGameSettingOperations;Lcom/xj/winemu/setup/core/SetupTaskContext;)Lcom/xj/winemu/setup/tasks/SetGameRecommConfigTask;\n'
              '\n'
              '    .line 27\n'
              '    .line 28\n'
              '    .line 29\n'
              '    move-result-object v2\n'
              '\n'
              '    .line 30\n'
              '    invoke-interface {v0, v2}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n',
              '    # BannerHub: skip SetGameRecommConfigTask offline (its class is in smali_classes12, replaced by prebuilt dex)\n'
              '    invoke-static {}, Lcom/blankj/utilcode/util/NetworkUtils;->r()Z\n'
              '    move-result v2\n'
              '    if-eqz v2, :bh_skip_recomm_task\n'
              '\n'
              '    invoke-virtual {p0, p2, p3}, Lcom/xj/winemu/setup/factory/SetupTaskFactory;->h(Lcom/xj/winemu/settings/PcGameSettingOperations;Lcom/xj/winemu/setup/core/SetupTaskContext;)Lcom/xj/winemu/setup/tasks/SetGameRecommConfigTask;\n'
              '\n'
              '    .line 27\n'
              '    .line 28\n'
              '    .line 29\n'
              '    move-result-object v2\n'
              '\n'
              '    .line 30\n'
              '    invoke-interface {v0, v2}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '    :bh_skip_recomm_task\n',
              'SetupTaskFactory.g(): omit SetGameRecommConfigTask from PC-game launch task list when NetworkUtils.r() is false'
          )

          # DependencyInstallTask fails offline too — even though the task's main class
          # is in smali_classes9 (reassembled, so we could patch it directly),
          # consistency with the SetGameRecommConfigTask fix wins: skip at the factory
          # level, same wrapping idiom. Tasks 2-4 in the list (ImageFsInstallTask,
          # ContainerInstallTask, ComponentsInstallTask) already short-circuit on
          # disk-present and need no patch; DependencyInstallTask is the last one and
          # it's failing.
          patch(
              'apktool_out_base/smali_classes2/com/xj/winemu/setup/factory/SetupTaskFactory.smali',
              '    invoke-virtual {p0, p1, p3}, Lcom/xj/winemu/setup/factory/SetupTaskFactory;->c(Ljava/lang/String;Lcom/xj/winemu/setup/core/SetupTaskContext;)Lcom/xj/winemu/setup/tasks/DependencyInstallTask;\n'
              '\n'
              '    .line 63\n'
              '    .line 64\n'
              '    .line 65\n'
              '    move-result-object p0\n'
              '\n'
              '    .line 66\n'
              '    invoke-interface {v0, p0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n',
              '    # BannerHub: skip DependencyInstallTask offline so already-installed deps do not trigger a network refresh\n'
              '    invoke-static {}, Lcom/blankj/utilcode/util/NetworkUtils;->r()Z\n'
              '    move-result v2\n'
              '    if-eqz v2, :bh_skip_deps_task\n'
              '\n'
              '    invoke-virtual {p0, p1, p3}, Lcom/xj/winemu/setup/factory/SetupTaskFactory;->c(Ljava/lang/String;Lcom/xj/winemu/setup/core/SetupTaskContext;)Lcom/xj/winemu/setup/tasks/DependencyInstallTask;\n'
              '\n'
              '    .line 63\n'
              '    .line 64\n'
              '    .line 65\n'
              '    move-result-object p0\n'
              '\n'
              '    .line 66\n'
              '    invoke-interface {v0, p0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '    :bh_skip_deps_task\n',
              'SetupTaskFactory.g(): omit DependencyInstallTask from PC-game launch task list when NetworkUtils.r() is false'
          )

          print("Offline Launch patch applied.")
          PYEOF

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: apktool_out_base
          path: apktool_out_base/
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - variant: Normal
            package: banner.hub
            label: "BannerHub"
          - variant: Normal(GHL)
            package: gamehub.lite
            label: "BannerHub"
          - variant: PuBG
            package: com.tencent.ig
            label: "BannerHub PuBG"
          - variant: AnTuTu
            package: com.antutu.ABenchMark
            label: "BannerHub AnTuTu"
          - variant: alt-AnTuTu
            package: com.antutu.benchmark.full
            label: "BannerHub AnTuTu"
          - variant: PuBG-CrossFire
            package: com.tencent.tmgp.cf
            label: "BannerHub PuBG CrossFire"
          - variant: Ludashi
            package: com.ludashi.aibench
            label: "BannerHub Ludashi"
          - variant: Genshin
            package: com.miHoYo.GenshinImpact
            label: "BannerHub Genshin"
          - variant: Original
            package: com.xiaoji.egggame
            label: "BannerHub Original"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: apktool_out_base
          path: apktool_out

      - name: Patch package name and label
        run: |
          PKG="${{ matrix.package }}"
          LABEL="${{ matrix.label }}"
          if [ "$PKG" != "gamehub.lite" ]; then
            # Replace all occurrences of gamehub.lite in the manifest (package, sharedUserId, authorities, permissions, etc.)
            sed -i "s/gamehub\.lite/$PKG/g" apktool_out/AndroidManifest.xml
          fi
          sed -i "s/android:label=\"GameHub Revanced\"/android:label=\"$LABEL\"/" apktool_out/AndroidManifest.xml

      - name: Rebuild APK
        run: |
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Inject original classes12.dex (skipped smali reassembly due to dex index limit)
          zip rebuilt-unsigned.apk apktool_out/classes12.dex --junk-paths

      - name: Inject BH_VERSION into extension
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Use | as sed delimiter so branch names containing / (e.g. fix/foo) don't break the s/// expression.
          sed -i "s|static final String BH_VERSION = \"[^\"]*\"|static final String BH_VERSION = \"$VERSION\"|" extension/BhSettingsExporter.java
          echo "BH_VERSION -> $VERSION"

      - name: Compile and inject GOG extension dex
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes extension/*.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_dex \
            $(find ext_classes -name "*.class")
          # Inject as classes18.dex (slots 1-17 already used by base APK + smali_classes16)
          cp ext_dex/classes.dex classes18.dex
          zip -j rebuilt-unsigned.apk classes18.dex

      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

      - name: Sign
        id: sign
        run: |
          # Sanitize ref name so branches like fix/foo don't put / into the file path
          SAFE_REF="${GITHUB_REF_NAME//\//-}"
          APK_NAME="BannerHub-${SAFE_REF}-${{ matrix.variant }}.apk"
          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk
          echo "Completed: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sign.outputs.apk_name }}
          path: ${{ steps.sign.outputs.apk_name }}
          retention-days: 1

  release:
    needs: build
    # Only auto-publish a GitHub Release on stable tag pushes (v3.7.2, etc).
    # Skips on workflow_dispatch entirely — pre/beta/amazon tags dispatched
    # manually produce artifacts only, matching the pre-release policy.
    # The push trigger above already filters out v*-pre*/v*-beta*/v*-amazon*,
    # so any push that reaches here is a stable tag.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: BannerHub-*.apk
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Bannerhub ${{ steps.tag.outputs.name }}
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: BannerHub-*.apk
